<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entregas | Almuerzos CEEP</title>
  <meta name="description" content="Vista protegida para entregas y cocina.">
  <meta name="theme-color" content="#a33d4d">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="statusBanner" class="status-banner" role="status" aria-live="polite"></div>
  <div class="site-shell">
    <header class="site-header">
      <a href="./deliveries.html" class="site-brand">Almuerzos CEEP</a>
      <nav class="site-nav" aria-label="Principal">
        <button type="button" id="deliveriesLogoutButton" class="site-nav__link site-nav__button">Salir</button>
      </nav>
    </header>

    <main class="admin-layout delivery-page">
      <section id="deliveriesContent" class="delivery-board">
        <div class="delivery-toolbar">
          <span id="deliveriesMenuTitle" hidden>Cargando menú...</span>
          <div class="delivery-toolbar__actions">
            <span id="deliveriesUpdatedAt" class="muted">Sincronizando...</span>
          </div>
        </div>

        <section class="card delivery-summary-card">
          <div class="delivery-summary-grid">
            <article class="delivery-summary">
              <span>PEDIDOS</span>
              <strong id="deliveriesTotalOrders">0</strong>
            </article>
            <article class="delivery-summary">
              <span>PAGADOS</span>
              <strong id="deliveriesPaidOrders">0</strong>
            </article>
            <article class="delivery-summary">
              <span>PAGADOS SIN ENTREGAR</span>
              <strong id="deliveriesPaidPendingOrders">0</strong>
            </article>
            <article class="delivery-summary">
              <span>ENTREGADOS</span>
              <strong id="deliveriesDeliveredOrders">0</strong>
            </article>
            <article class="delivery-summary">
              <span>PENDIENTES</span>
              <strong id="deliveriesPendingOrders" class="delivery-summary__alert">0</strong>
            </article>
          </div>
        </section>

        <p id="deliveriesFeedback" class="deliveries-feedback" aria-live="polite"></p>

        <section class="card delivery-table-card">
          <div class="delivery-table">
            <div class="delivery-table__head">
              <span>PEDIDO</span>
              <span>SOLICITUD</span>
              <span>PAGO</span>
              <span>ESTADO ENTREGA</span>
              <span>ACCIÓN</span>
            </div>
            <div id="deliveriesList" class="delivery-table__body">
              <div class="delivery-table__empty">No hay compras registradas todavía.</div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      © 2026 · Todos los derechos reservados · Desarrollado por Cristian Ramírez
    </footer>
  </div>

  <template id="deliveryRowTemplate">
    <article class="delivery-table__row">
      <div class="delivery-table__cell delivery-table__cell--start">
        <strong class="buyer-name delivery-name-card"></strong>
        <p class="delivery-order-meta"></p>
      </div>
      <div class="delivery-table__cell">
        <span class="delivery-order-status-pill delivery-order-status"></span>
        <p class="delivery-status-time delivery-created-at"></p>
      </div>
      <div class="delivery-table__cell">
        <span class="delivery-payment-status"></span>
        <p class="delivery-status-time delivery-payment-confirmed-at"></p>
      </div>
      <div class="delivery-table__cell">
        <!-- JS populates: current delivery status pill -->
        <span class="delivery-order-status-pill delivery-workflow-status"></span>
        <p class="delivery-status-time delivery-delivered-at"></p>
      </div>
      <div class="delivery-table__cell delivery-workflow-actions">
        <!-- JS populates: next-step action button -->
      </div>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="./config.js"></script>
  <script src="./supabase-client.js"></script>
  <script src="./deliveries.js" defer></script>
</body>
</html>
