<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helper | Almuerzos CEEP</title>
  <meta name="description" content="Vista helper para menu y entregas.">
  <meta name="theme-color" content="#a33d4d">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a href="./helper.html" class="site-brand">Almuerzos CEEP</a>
      <nav class="site-nav" aria-label="Principal">
        <button type="button" id="helperLogoutButton" class="site-nav__link site-nav__button">Salir</button>
      </nav>
    </header>

    <main class="admin-layout helper-layout">
      <section class="card admin-card">
        <div class="section-title">
          <div>
            <p class="eyebrow">Helper</p>
            <h2>Actualizar menú del día</h2>
          </div>
          <div class="admin-actions">
            <span id="helperUpdatedAt" class="muted">Sincronizando...</span>
          </div>
        </div>

        <form id="helperMenuForm" class="form">
          <label>
            Nombre del menú
            <input id="helperMenuTitleInput" name="title" type="text" maxlength="120" required>
          </label>

          <label>
            Descripción
            <textarea id="helperMenuDescriptionInput" name="description" rows="4" maxlength="250" required></textarea>
          </label>

          <label>
            Precio en colones
            <input id="helperMenuPriceInput" name="price" type="number" min="0" step="1" required>
          </label>

          <button id="helperMenuSubmitButton" type="submit" class="button">Guardar menú de hoy</button>
          <p id="helperMenuFeedback" class="feedback" aria-live="polite"></p>
        </form>
      </section>

      <section class="card delivery-summary-card">
        <div class="delivery-summary-grid">
          <article class="delivery-summary">
            <span>PEDIDOS</span>
            <strong id="helperTotalOrders">0</strong>
          </article>
          <article class="delivery-summary">
            <span>PAGO PENDIENTE</span>
            <strong id="helperPendingPaymentCount">0</strong>
          </article>
          <article class="delivery-summary">
            <span>PAGADOS</span>
            <strong id="helperPaidOrders">0</strong>
          </article>
          <article class="delivery-summary">
            <span>ENTREGADOS</span>
            <strong id="helperDeliveredOrders">0</strong>
          </article>
          <article class="delivery-summary">
            <span>PENDIENTES</span>
            <strong id="helperPendingOrders" class="delivery-summary__alert">0</strong>
          </article>
        </div>
      </section>

      <section class="card delivery-table-card helper-deliveries-card">
        <div class="delivery-table">
          <div class="delivery-table__head">
            <span>PEDIDO</span>
            <span>SOLICITUD</span>
            <span>ESTADO DEL PAGO</span>
            <span>PENDIENTE</span>
            <span>ENTREGADO</span>
          </div>
          <div id="helperDeliveriesList" class="delivery-table__body">
            <div class="delivery-table__empty">No hay compras registradas todavía.</div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      © 2026 · Todos los derechos reservados · Desarrollado por Cristian Ramírez
    </footer>
  </div>

  <template id="helperDeliveryRowTemplate">
    <article class="delivery-table__row">
      <div class="delivery-table__cell">
        <strong class="buyer-name delivery-name-card"></strong>
        <p class="delivery-order-meta"></p>
      </div>
      <div class="delivery-table__cell">
        <span class="delivery-order-status-pill helper-order-status"></span>
        <p class="delivery-status-time helper-created-at"></p>
      </div>
      <div class="delivery-table__cell">
        <span class="delivery-payment-status helper-payment-status"></span>
        <p class="delivery-status-time helper-payment-confirmed-at"></p>
      </div>
      <div class="delivery-table__cell">
        <button type="button" class="delivery-action helper-delivery-action" data-delivery-status="PENDIENTE_ENTREGA">Pendiente</button>
      </div>
      <div class="delivery-table__cell">
        <button type="button" class="delivery-action helper-delivery-action" data-delivery-status="ENTREGADO">Entregado</button>
        <p class="delivery-status-time helper-delivered-at">-</p>
      </div>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="./config.js"></script>
  <script src="./supabase-client.js"></script>
  <script src="./helper.js" defer></script>
</body>
</html>
