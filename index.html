<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso | Almuerzos CEEP</title>
  <meta name="description" content="Acceso por rol para almuerzos CEEP.">
  <meta name="theme-color" content="#a33d4d">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a href="./index.html" class="site-brand">Almuerzos CEEP</a>
    </header>

  <main class="admin-layout">
    <section class="card admin-gate login-gate">
      <div class="section-title">
        <div>
          <p class="eyebrow">Acceso por rol</p>
          <h1>Ingrese la clave</h1>
        </div>
      </div>
      <p class="admin-hero__text">
        Ingrese su contraseña y el sistema le mostrará únicamente el módulo que corresponde a su rol.
      </p>
      <form id="loginForm" class="form">
        <label>
          Contraseña
          <input id="loginPassword" name="loginPassword" type="password" maxlength="120" required autofocus>
        </label>
        <button id="loginSubmit" type="submit" class="button">Ingresar</button>
        <p id="loginFeedback" class="feedback" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    © 2026 · Todos los derechos reservados · Desarrollado por Cristian Ramírez
  </footer>
  </div>

  <script src="./config.js"></script>
  <script src="./login.js" defer></script>
</body>
</html>
